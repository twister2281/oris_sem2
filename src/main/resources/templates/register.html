<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        form { max-width: 420px; display: grid; gap: 0.8rem; }
        .error { color: #b00020; }
        .success { color: #0a7a22; }
        input { padding: 0.45rem; }
        button { padding: 0.55rem; cursor: pointer; }
    </style>
</head>
<body>
<h1>Регистрация</h1>

<p class="success" th:if="${param.registered}">Регистрация прошла успешно. Войдите в систему.</p>
<p class="error" th:if="${registrationError}" th:text="${registrationError}"></p>

<form th:action="@{/register}" th:object="${registrationRequest}" method="post">
    <input type="text" th:field="*{name}" placeholder="Имя" required>
    <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

    <input type="text" th:field="*{username}" placeholder="Логин" required>
    <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>

    <input type="password" th:field="*{password}" placeholder="Пароль" required>
    <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

    <button type="submit">Зарегистрироваться</button>
</form>

<p><a th:href="@{/login}">Уже есть аккаунт? Войти</a></p>
</body>
</html>
